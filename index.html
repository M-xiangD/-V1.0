<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>电池健康检测报告</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .card-title {
            font-size: 1.5em;
            color: #667eea;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .info-item {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            border-left: 4px solid #667eea;
        }

        .info-item label {
            display: block;
            color: #666;
            font-size: 0.9em;
            margin-bottom: 5px;
        }

        .info-item .value {
            font-size: 1.3em;
            font-weight: bold;
            color: #333;
        }

        .health-score {
            text-align: center;
            padding: 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 15px;
            color: white;
            margin-bottom: 20px;
        }

        .health-score .score {
            font-size: 4em;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .health-score .assessment {
            font-size: 1.5em;
            margin-bottom: 10px;
        }

        .health-score .icon {
            font-size: 3em;
            margin-bottom: 15px;
        }

        .charts-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .chart-box {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .chart-box h3 {
            text-align: center;
            color: #667eea;
            margin-bottom: 15px;
        }

        .recommendations {
            background: #fff3cd;
            border-left: 4px solid #ffc107;
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
        }

        .recommendations h3 {
            color: #856404;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .recommendations ul {
            list-style: none;
            padding-left: 0;
        }

        .recommendations li {
            padding: 10px;
            margin-bottom: 10px;
            background: white;
            border-radius: 5px;
            display: flex;
            align-items: flex-start;
            gap: 10px;
        }

        .recommendations li i {
            color: #ffc107;
            margin-top: 3px;
        }

        .battery-icon {
            text-align: center;
            margin: 20px 0;
        }

        .battery-icon i {
            font-size: 8em;
            color: #667eea;
        }

        .capacity-bar {
            height: 30px;
            background: #e0e0e0;
            border-radius: 15px;
            overflow: hidden;
            margin: 10px 0;
            position: relative;
        }

        .capacity-bar .fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            transition: width 1s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
        }

        .status-badge {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9em;
            font-weight: bold;
            margin-left: 10px;
        }

        .status-charging {
            background: #28a745;
            color: white;
        }

        .status-discharging {
            background: #ffc107;
            color: #333;
        }

        .status-full {
            background: #17a2b8;
            color: white;
        }

        .footer {
            text-align: center;
            color: white;
            margin-top: 30px;
            padding: 20px;
            opacity: 0.8;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8em;
            }

            .charts-container {
                grid-template-columns: 1fr;
            }

            .health-score .score {
                font-size: 3em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-battery-full"></i> 电池健康检测报告</h1>
            <p id="report-time">检测时间: --</p>
        </div>

        <div class="health-score">
            <div class="icon">
                <i class="fas fa-battery-three-quarters"></i>
            </div>
            <div class="score" id="health-score">--%</div>
            <div class="assessment" id="assessment">--</div>
        </div>

        <div class="card">
            <div class="card-title">
                <i class="fas fa-info-circle"></i> 基本信息
            </div>
            <div class="info-grid">
                <div class="info-item">
                    <label>制造商</label>
                    <div class="value" id="manufacturer">--</div>
                </div>
                <div class="info-item">
                    <label>序列号</label>
                    <div class="value" id="serial-number">--</div>
                </div>
                <div class="info-item">
                    <label>化学成分</label>
                    <div class="value" id="chemistry">--</div>
                </div>
                <div class="info-item">
                    <label>当前电量</label>
                    <div class="value" id="current-charge">--%</div>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-title">
                <i class="fas fa-battery-half"></i> 容量信息
            </div>
            <div class="info-grid">
                <div class="info-item">
                    <label>设计容量</label>
                    <div class="value" id="design-capacity">--</div>
                </div>
                <div class="info-item">
                    <label>当前完全充电容量</label>
                    <div class="value" id="full-charge-capacity">--</div>
                </div>
                <div class="info-item">
                    <label>容量损失</label>
                    <div class="value" id="capacity-loss">--</div>
                </div>
            </div>

            <div class="capacity-bar">
                <div class="fill" id="capacity-bar-fill" style="width: 0%">
                    <span id="capacity-percentage">--%</span>
                </div>
            </div>
        </div>

        <div class="charts-container">
            <div class="chart-box">
                <h3><i class="fas fa-chart-pie"></i> 容量对比</h3>
                <canvas id="capacityChart"></canvas>
            </div>
            <div class="chart-box">
                <h3><i class="fas fa-chart-line"></i> 健康度趋势</h3>
                <canvas id="healthChart"></canvas>
            </div>
        </div>

        <div class="card">
            <div class="card-title">
                <i class="fas fa-lightbulb"></i> 使用建议
            </div>
            <div class="recommendations">
                <h3><i class="fas fa-exclamation-triangle"></i> 建议</h3>
                <ul id="recommendations-list">
                </ul>
            </div>
        </div>

        <div class="footer">
            <p>电池健康检测程序 v1.0 | 生成时间: <span id="generation-time">--</span></p>
        </div>
    </div>

    <script>
        let capacityChart = null;
        let healthChart = null;

        function loadBatteryData() {
            fetch('battery_health_report.json')
                .then(response => response.json())
                .then(data => {
                    displayData(data);
                })
                .catch(error => {
                    console.error('加载数据失败:', error);
                    document.getElementById('report-time').textContent = '无法加载电池数据';
                });
        }

        function displayData(data) {
            const batteryInfo = data['电池信息'];

            document.getElementById('report-time').textContent = '检测时间: ' + data['检测时间'];
            document.getElementById('generation-time').textContent = data['检测时间'];

            document.getElementById('health-score').textContent = data['健康度'] + '%';
            document.getElementById('assessment').textContent = data['评估结果'];

            document.getElementById('manufacturer').textContent = batteryInfo['manufacturer'] || '--';
            document.getElementById('serial-number').textContent = batteryInfo['serial_number'] || '--';
            document.getElementById('chemistry').textContent = batteryInfo['chemistry'] || '--';
            document.getElementById('current-charge').textContent = (batteryInfo['estimated_charge_remaining'] || '--') + '%';

            const designCapacity = batteryInfo['design_capacity'];
            const fullChargeCapacity = batteryInfo['full_charge_capacity'];

            if (designCapacity && fullChargeCapacity) {
                document.getElementById('design-capacity').textContent = formatCapacity(designCapacity);
                document.getElementById('full-charge-capacity').textContent = formatCapacity(fullChargeCapacity);

                const capacityLoss = designCapacity - fullChargeCapacity;
                const lossPercentage = ((capacityLoss / designCapacity) * 100).toFixed(2);
                document.getElementById('capacity-loss').textContent = formatCapacity(capacityLoss) + ' (' + lossPercentage + '%)';

                const healthPercentage = data['健康度'];
                document.getElementById('capacity-bar-fill').style.width = healthPercentage + '%';
                document.getElementById('capacity-percentage').textContent = healthPercentage + '%';

                updateCapacityChart(designCapacity, fullChargeCapacity);
                updateHealthChart(data['健康度']);
            }

            const recommendationsList = document.getElementById('recommendations-list');
            recommendationsList.innerHTML = '';
            if (data['建议'] && data['建议'].length > 0) {
                data['建议'].forEach(recommendation => {
                    const li = document.createElement('li');
                    li.innerHTML = '<i class="fas fa-check-circle"></i> ' + recommendation;
                    recommendationsList.appendChild(li);
                });
            }
        }

        function formatCapacity(mwh) {
            const wh = (mwh / 1000).toFixed(2);
            return wh + ' Wh (' + mwh.toLocaleString() + ' mWh)';
        }

        function updateCapacityChart(designCapacity, fullChargeCapacity) {
            const ctx = document.getElementById('capacityChart').getContext('2d');

            if (capacityChart) {
                capacityChart.destroy();
            }

            capacityChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['当前容量', '容量损失'],
                    datasets: [{
                        data: [fullChargeCapacity, designCapacity - fullChargeCapacity],
                        backgroundColor: [
                            '#667eea',
                            '#e0e0e0'
                        ],
                        borderWidth: 0
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: {
                            position: 'bottom'
                        },
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    const value = context.raw;
                                    const percentage = ((value / designCapacity) * 100).toFixed(1);
                                    return context.label + ': ' + formatCapacity(value) + ' (' + percentage + '%)';
                                }
                            }
                        }
                    }
                }
            });
        }

        function updateHealthChart(healthScore) {
            const ctx = document.getElementById('healthChart').getContext('2d');

            if (healthChart) {
                healthChart.destroy();
            }

            healthChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['健康度'],
                    datasets: [{
                        label: '健康度 (%)',
                        data: [healthScore],
                        backgroundColor: [
                            healthScore >= 80 ? '#28a745' :
                            healthScore >= 60 ? '#ffc107' :
                            healthScore >= 40 ? '#fd7e14' : '#dc3545'
                        ],
                        borderWidth: 0,
                        borderRadius: 10
                    }]
                },
                options: {
                    responsive: true,
                    scales: {
                        y: {
                            beginAtZero: true,
                            max: 100,
                            ticks: {
                                callback: function(value) {
                                    return value + '%';
                                }
                            }
                        }
                    },
                    plugins: {
                        legend: {
                            display: false
                        }
                    }
                }
            });
        }

        document.addEventListener('DOMContentLoaded', loadBatteryData);
    </script>
</body>
</html>
